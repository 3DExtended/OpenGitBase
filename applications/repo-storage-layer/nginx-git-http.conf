worker_processes 1;
pid /var/run/nginx-git-http.pid;
error_log /dev/stderr info;

events {
    worker_connections 64;
}

http {
    access_log /dev/stdout;
    server {
        listen 8082;
        server_name _;
        # Default nginx limit is 1m; git push packs exceed that. Align with API MaxFileBytes (50m).
        client_max_body_size 50m;

        location ~ ^/[^/]+\.git/(HEAD|info/refs|objects/info/.*|git-(upload|receive)-pack)$ {
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
            include /etc/nginx/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /usr/lib/git-core/git-http-backend;
            fastcgi_param GIT_HTTP_EXPORT_ALL "";
            fastcgi_param GIT_PROJECT_ROOT /srv/git;
            fastcgi_param PATH_INFO $uri;
            fastcgi_param HOME /home/git;
            # Access control runs at the dispatcher; internal git-http trusts REMOTE_USER.
            fastcgi_param REMOTE_USER git;
        }

        location / {
            return 404;
        }
    }

    server {
        listen 8443 ssl;
        server_name _;
        client_max_body_size 50m;

        ssl_certificate /etc/opengitbase/node.crt;
        ssl_certificate_key /etc/opengitbase/node.key;
        ssl_client_certificate /etc/opengitbase/ca.crt;
        ssl_verify_client on;

        location ~ ^/[^/]+\.git/(HEAD|info/refs|objects/info/.*|git-(upload|receive)-pack)$ {
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
            include /etc/nginx/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /usr/lib/git-core/git-http-backend;
            fastcgi_param GIT_HTTP_EXPORT_ALL "";
            fastcgi_param GIT_PROJECT_ROOT /srv/git;
            fastcgi_param PATH_INFO $uri;
            fastcgi_param HOME /home/git;
            fastcgi_param REMOTE_USER git;
        }

        location / {
            return 404;
        }
    }
}
