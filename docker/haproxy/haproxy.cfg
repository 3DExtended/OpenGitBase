global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  timeout connect 5s
  timeout client  2m
  timeout server  2m

frontend ssh_in
  bind :22
  mode tcp
  option tcplog
  default_backend dispatchers

backend dispatchers
  mode tcp
  balance roundrobin
  server dispatcher_1 dispatcher-1:22 check init-addr none
  server dispatcher_2 dispatcher-2:22 check init-addr none

frontend api_in
  bind :8080
  mode http
  option httplog
  default_backend api_servers

backend api_servers
  mode http
  balance roundrobin
  option httpchk GET /health
  server api_1 api-1:8080 check
  server api_2 api-2:8080 check

frontend web_in
  bind :8081
  mode http
  option httplog
  default_backend web_servers

backend web_servers
  mode http
  balance roundrobin
  option httpchk GET /
  server web_1 web-1:8080 check init-addr none
  server web_2 web-2:8080 check init-addr none
