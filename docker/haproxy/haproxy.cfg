global
  log stdout format raw local0
  maxconn 4096

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry 1s
  hold valid 2s

defaults
  log global
  timeout connect 5s
  timeout client  2m
  timeout server  2m

# Unified HTTP frontend: API (/api/*), Git Smart HTTP (/{owner}/{repo}.git/*), web UI (default).
# Cloudflare tunnel and host port 8089 target this frontend on :8080.
frontend http_in
  bind :8080
  mode http
  option httplog
  option forwardfor

  acl host_www hdr_beg(host) -i www.
  acl path_git path_reg -i ^/[^/]+/[^/]+\.git
  acl path_api path_beg /api
  acl path_health path /health

  http-request set-var(txn.apex_host) req.hdr(host),regsub(^www\.,,) if host_www
  http-request redirect code 301 location http://%[var(txn.apex_host)]%[path]?%[query] if host_www path_git

  use_backend dispatcher_http if path_git
  use_backend api_servers if path_api or path_health
  default_backend web_servers

backend api_servers
  mode http
  balance roundrobin
  option httpchk GET /health
  http-request set-path %[path,regsub(^/api,,i)] if { path_beg /api }
  server api_1 api-1:8080 check init-addr none resolvers docker
  server api_2 api-2:8080 check init-addr none resolvers docker

backend dispatcher_http
  mode http
  balance roundrobin
  server dispatcher_1 dispatcher-1:8082 check init-addr none resolvers docker
  server dispatcher_2 dispatcher-2:8082 check init-addr none resolvers docker

backend web_servers
  mode http
  balance roundrobin
  option httpchk GET /
  server web_1 web-1:8080 check init-addr none resolvers docker
  server web_2 web-2:8080 check init-addr none resolvers docker
