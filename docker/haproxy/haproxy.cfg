global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 5s
  timeout client  2m
  timeout server  2m

frontend ssh_in
  bind :22
  default_backend dispatchers

backend dispatchers
  balance roundrobin
  server dispatcher_1 dispatcher-1:22 check
  server dispatcher_2 dispatcher-2:22 check

