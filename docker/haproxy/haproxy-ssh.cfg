global
  log stdout format raw local0
  maxconn 4096

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry 1s
  hold valid 2s

defaults
  log global
  timeout connect 5s
  timeout client  2m
  timeout server  2m

# Optional SSH git entrypoint (docker compose --profile ssh).
frontend ssh_in
  bind :22
  mode tcp
  option tcplog
  default_backend dispatchers

backend dispatchers
  mode tcp
  balance roundrobin
  server dispatcher_1 dispatcher-1:22 check init-addr none resolvers docker
  server dispatcher_2 dispatcher-2:22 check init-addr none resolvers docker
