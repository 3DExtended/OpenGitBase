x-api-build: &api-build
  context: .
  dockerfile: applications/OpenGitBase.Api/Dockerfile

x-api-image: &api-image
  image: opengitbase-api
  build: *api-build

x-kafka-broker-env: &kafka-broker-env
  CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
  KAFKA_LOG_DIRS: /var/lib/kafka/data
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  # KRaft quorum formation can exceed the default 60s when brokers restart together.
  KAFKA_BROKER_REGISTRATION_TIMEOUT_MS: 180000

x-kafka-healthcheck: &kafka-healthcheck
  test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server $(hostname):29092 >/dev/null 2>&1"]
  interval: 10s
  timeout: 15s
  retries: 18
  start_period: 60s

x-api-environment: &api-environment
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://+:8080
  Sql__ConnectionString: "Host=postgres;Port=5432;Database=opengitbase;Username=postgres;Password=postgres"
  Debug__Features__EmailVerification: "true"
  GIT_SSH_ENABLED: "false"
  Git__PublicBaseUrl: "https://api.opengitbase.com"
  REDIS_URL: "redis://redis:6379"
  Kafka__BootstrapServers: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
  LayerStore__Endpoint: "http://minio:9000"
  LayerStore__Bucket: "opengitbase-layers"
  LayerStore__AccessKey: "opengitbase"
  LayerStore__SecretKey: "opengitbase-minio-dev"

x-api-common: &api-common
  <<: *api-image
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  environment: *api-environment
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
    interval: 5s
    timeout: 5s
    retries: 10
    start_period: 30s

x-web-build: &web-build
  context: .
  dockerfile: applications/opengitbase-web/Dockerfile
  args:
    NUXT_PUBLIC_INSTANCE_NAME: OpenGitBase
    NUXT_PUBLIC_API_BASE: /api
    DEPLOY_BUMP: ${DEPLOY_BUMP:-0}
    GIT_SHA: ${GIT_SHA:-unknown}

x-web-image: &web-image
  image: opengitbase-web
  build: *web-build

x-web-common: &web-common
  <<: *web-image
  restart: unless-stopped
  depends_on:
    ssh-lb:
      condition: service_started
    api-1:
      condition: service_healthy
    api-2:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s
  environment:
    FLEET_API_URL: "http://api-lb:8080"
    FleetComponent__SelfRegistrationEnabled: "true"
    FleetComponent__HeartbeatIntervalSeconds: "30"

x-storage-build: &storage-build
  context: ./applications/repo-storage-layer
  dockerfile: Dockerfile

x-storage-common: &storage-common
  image: opengitbase-storage
  restart: unless-stopped
  build: *storage-build
  # RF=4 local role mapping (see PlatformRf4FleetLayout):
  #   storage-1 → write primary + read replica (plaintext bare git under /srv/git)
  #   storage-2, storage-3 → encrypted replication artifacts under /var/lib/opengitbase/artifacts
  environment:
    STORAGE_ARTIFACT_ROOT: "/var/lib/opengitbase/artifacts"
  depends_on:
    api-1:
      condition: service_healthy
    api-2:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "pgrep -x sshd > /dev/null && pgrep -f storage-http-server.py > /dev/null && pgrep -x nginx > /dev/null"]
    interval: 5s
    timeout: 3s
    retries: 12
    start_period: 30s

x-dispatcher-build: &dispatcher-build
  context: ./applications/OpenGitBase.Dispatcher
  dockerfile: Dockerfile

x-compute-agent-build: &compute-agent-build
  context: .
  dockerfile: applications/OpenGitBase.ComputeAgent/Dockerfile

x-dispatcher-common: &dispatcher-common
  image: opengitbase-dispatcher
  restart: unless-stopped
  build: *dispatcher-build
  depends_on:
    api-1:
      condition: service_healthy
    api-2:
      condition: service_healthy
    storage-1:
      condition: service_healthy
    storage-2:
      condition: service_healthy
    storage-3:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/health >/dev/null || exit 1"]
    interval: 5s
    timeout: 3s
    retries: 5
    start_period: 15s

services:

  ssh-lb:
    image: haproxy:3.2
    container_name: opengitbase_ssh_lb
    restart: unless-stopped
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    ports:
      - "8089:8080"
      - "3000:8080"
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      default:
        aliases:
          - api-lb

  storage-1:
    <<: *storage-common
    container_name: opengitbase_storage_1
    environment:
      STORAGE_API_URL: "http://api-lb:8080"
      STORAGE_NODE_ID: "storage-1"
      STORAGE_INTERNAL_HOST: "storage-1"
      STORAGE_INTERNAL_HTTP_PORT: "8081"
      STORAGE_INTERNAL_GIT_HTTP_PORT: "8082"
      STORAGE_GIT_HTTP_PORT: "8082"
      STORAGE_ENROLLMENT_TOKEN: ""
      DISPATCHER_SSH_PUBLIC_KEY: ""
    volumes:
      - opengitbase_storage1_repos:/srv/git
      - ./docker/pki/storage-1.crt:/etc/opengitbase/node.crt:ro
      - ./docker/pki/storage-1.key:/etc/opengitbase/node.key:ro
      - ./docker/pki/ca.crt:/etc/opengitbase/ca.crt:ro

  storage-2:
    <<: *storage-common
    container_name: opengitbase_storage_2
    environment:
      STORAGE_API_URL: "http://api-lb:8080"
      STORAGE_NODE_ID: "storage-2"
      STORAGE_INTERNAL_HOST: "storage-2"
      STORAGE_INTERNAL_HTTP_PORT: "8081"
      STORAGE_INTERNAL_GIT_HTTP_PORT: "8082"
      STORAGE_GIT_HTTP_PORT: "8082"
      STORAGE_ENROLLMENT_TOKEN: ""
      DISPATCHER_SSH_PUBLIC_KEY: ""
    volumes:
      - opengitbase_storage2_repos:/srv/git
      - ./docker/pki/storage-2.crt:/etc/opengitbase/node.crt:ro
      - ./docker/pki/storage-2.key:/etc/opengitbase/node.key:ro
      - ./docker/pki/ca.crt:/etc/opengitbase/ca.crt:ro

  storage-3:
    <<: *storage-common
    container_name: opengitbase_storage_3
    environment:
      STORAGE_API_URL: "http://api-lb:8080"
      STORAGE_NODE_ID: "storage-3"
      STORAGE_INTERNAL_HOST: "storage-3"
      STORAGE_INTERNAL_HTTP_PORT: "8081"
      STORAGE_INTERNAL_GIT_HTTP_PORT: "8082"
      STORAGE_GIT_HTTP_PORT: "8082"
      STORAGE_ENROLLMENT_TOKEN: ""
      DISPATCHER_SSH_PUBLIC_KEY: ""
    volumes:
      - opengitbase_storage3_repos:/srv/git
      - ./docker/pki/storage-3.crt:/etc/opengitbase/node.crt:ro
      - ./docker/pki/storage-3.key:/etc/opengitbase/node.key:ro
      - ./docker/pki/ca.crt:/etc/opengitbase/ca.crt:ro

  storage-4:
    <<: *storage-common
    container_name: opengitbase_storage_4
    environment:
      STORAGE_API_URL: "http://api-lb:8080"
      STORAGE_NODE_ID: "storage-4"
      STORAGE_INTERNAL_HOST: "storage-4"
      STORAGE_INTERNAL_HTTP_PORT: "8081"
      STORAGE_INTERNAL_GIT_HTTP_PORT: "8082"
      STORAGE_GIT_HTTP_PORT: "8082"
      STORAGE_ENROLLMENT_TOKEN: ""
      DISPATCHER_SSH_PUBLIC_KEY: ""
    volumes:
      - opengitbase_storage4_repos:/srv/git
      - ./docker/pki/storage-4.crt:/etc/opengitbase/node.crt:ro
      - ./docker/pki/storage-4.key:/etc/opengitbase/node.key:ro
      - ./docker/pki/ca.crt:/etc/opengitbase/ca.crt:ro

  dispatcher-1:
    <<: *dispatcher-common
    container_name: opengitbase_dispatcher_1
    ports:
      - "8822:8082"
    environment:
      DISPATCHER_API_URL: "http://api-lb:8080"
      Dispatcher__ApiUrl: "http://api-lb:8080"
      Dispatcher__DispatcherId: "dispatcher-1"
      Dispatcher__HttpPort: "8082"
      Dispatcher__FleetSelfRegistrationEnabled: "true"
      Dispatcher__FleetHeartbeatIntervalSeconds: "30"
      Dispatcher__StorageSshPrivateKeyPath: "/run/secrets/dispatcher_storage_ssh"
      Dispatcher__StorageSshUser: "git"
      GIT_SSH_ENABLED: "false"
      FLEET_BOOTSTRAP_TOKEN: ""

  dispatcher-2:
    <<: *dispatcher-common
    container_name: opengitbase_dispatcher_2
    environment:
      DISPATCHER_API_URL: "http://api-lb:8080"
      Dispatcher__ApiUrl: "http://api-lb:8080"
      Dispatcher__DispatcherId: "dispatcher-2"
      Dispatcher__HttpPort: "8082"
      Dispatcher__FleetSelfRegistrationEnabled: "true"
      Dispatcher__FleetHeartbeatIntervalSeconds: "30"
      Dispatcher__StorageSshPrivateKeyPath: "/run/secrets/dispatcher_storage_ssh"
      Dispatcher__StorageSshUser: "git"
      GIT_SSH_ENABLED: "false"
      FLEET_BOOTSTRAP_TOKEN: ""

  compute-agent-1:
    image: opengitbase-compute-agent
    container_name: opengitbase_compute_agent_1
    restart: unless-stopped
    build: *compute-agent-build
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    environment:
      ComputeAgent__ApiBaseUrl: "http://api-lb:8080"
      ComputeAgent__NodeId: "compute-agent-1"
      ComputeAgent__EnrollmentToken: ""
      ComputeAgent__PreferProcessSandbox: "true"

  compute-agent-firecracker:
    profiles: ["firecracker"]
    image: opengitbase-compute-agent
    container_name: opengitbase_compute_agent_firecracker
    restart: unless-stopped
    build: *compute-agent-build
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    environment:
      ComputeAgent__ApiBaseUrl: "http://api-lb:8080"
      ComputeAgent__NodeId: "compute-agent-firecracker"
      ComputeAgent__EnrollmentToken: ""
      ComputeAgent__PreferProcessSandbox: "false"
      ComputeAgent__KernelPath: "/var/lib/opengitbase/vmlinux"

  postgres:
    image: postgres:16
    container_name: opengitbase_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opengitbase
    volumes:
      - opengitbase_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opengitbase_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  kafka-1:
    image: apache/kafka:3.9.0
    container_name: opengitbase_kafka_1
    hostname: kafka-1
    restart: unless-stopped
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:29092,CONTROLLER://kafka-1:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
    ports:
      - "9092:9092"
    volumes:
      - opengitbase_kafka_1_data:/var/lib/kafka/data
    healthcheck:
      <<: *kafka-healthcheck

  kafka-2:
    image: apache/kafka:3.9.0
    container_name: opengitbase_kafka_2
    hostname: kafka-2
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_started
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:29092,CONTROLLER://kafka-2:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092
    volumes:
      - opengitbase_kafka_2_data:/var/lib/kafka/data
    healthcheck:
      <<: *kafka-healthcheck

  kafka-3:
    image: apache/kafka:3.9.0
    container_name: opengitbase_kafka_3
    hostname: kafka-3
    restart: unless-stopped
    depends_on:
      kafka-2:
        condition: service_started
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:29092,CONTROLLER://kafka-3:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092
    volumes:
      - opengitbase_kafka_3_data:/var/lib/kafka/data
    healthcheck:
      <<: *kafka-healthcheck

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: opengitbase_kafka_init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    volumes:
      - ./docker/kafka/bootstrap-topics.sh:/bootstrap-topics.sh:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
    entrypoint: ["/bin/bash", "/bootstrap-topics.sh"]
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: opengitbase_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opengitbase
      MINIO_ROOT_PASSWORD: opengitbase-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - opengitbase_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: opengitbase_minio_init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init-layer-store.sh:/init-layer-store.sh:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      LAYER_STORE_BUCKET: opengitbase-layers
      MINIO_ROOT_USER: opengitbase
      MINIO_ROOT_PASSWORD: opengitbase-minio-dev
    entrypoint: ["/bin/sh", "/init-layer-store.sh"]
    restart: "no"

  api-1:
    <<: *api-common
    container_name: opengitbase_api_1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *api-environment
      FleetComponent__InstanceId: api-1

  api-2:
    <<: *api-common
    container_name: opengitbase_api_2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *api-environment
      FleetComponent__InstanceId: api-2

  api-migrate:
    <<: *api-image
    container_name: opengitbase_api_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *api-environment
      OPENGITBASE_MIGRATE_ONLY: "true"
    restart: "no"
    profiles:
      - tools

  web-1:
    <<: *web-common
    container_name: opengitbase_web_1
    environment:
      FleetComponent__InstanceId: web-1

  web-2:
    <<: *web-common
    container_name: opengitbase_web_2
    environment:
      FleetComponent__InstanceId: web-2

  opengitbase_cloudflare_tunnel:
    profiles:
      - production-tunnel
    image: cloudflare/cloudflared:latest
    container_name: opengitbase_cloudflare_tunnel
    depends_on:
      ssh-lb:
        condition: service_started
      web-1:
        condition: service_started
      web-2:
        condition: service_started
    restart: always
    # Unified HTTP frontend (API + Git Smart HTTP + web UI). In Cloudflare, route
    # opengitbase.com and www.opengitbase.com to this tunnel; git paths on www redirect to apex.
    command: tunnel --no-autoupdate run --url http://ssh-lb:8080 --token REPLACE_WITH_CLOUDFLARE_TUNNEL_TOKEN

volumes:
  opengitbase_pgdata:
  opengitbase_minio_data:
  opengitbase_kafka_1_data:
  opengitbase_kafka_2_data:
  opengitbase_kafka_3_data:
  opengitbase_storage1_repos:
  opengitbase_storage2_repos:
  opengitbase_storage3_repos:
  opengitbase_storage4_repos:
