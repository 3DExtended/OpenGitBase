services:

  storage-1:
    container_name: opengitbase_storage_1
    restart: unless-stopped
    build:
      context: ./applications/repo-storage-layer   # Deine EXISTIERende Storage
      dockerfile: Dockerfile
    ports:
      - "2225:22"                    # SSH auf 2225
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - opengitbase_storage1_ssh:/home/git/.ssh      # SSH Keys
      - opengitbase_storage1_repos:/srv/git          # Git Repos!


  storage-2:
    container_name: opengitbase_storage_2
    restart: unless-stopped
    build:
      context: ./applications/repo-storage-layer   # Deine EXISTIERende Storage
      dockerfile: Dockerfile
    ports:
      - "2226:22"                    # SSH auf 2226
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - opengitbase_storage2_ssh:/home/git/.ssh      # SSH Keys
      - opengitbase_storage2_repos:/srv/git          # Git Repos!


  dispatcher-1:
    container_name: opengitbase_dispatcher_1
    restart: unless-stopped
    build:
      context: ./applications/OpenGitBase.Dispatcher    # Build vom dispatcher-Pfad
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_started          # Dispatcher startet nach API
    ports:
      - "2223:22"                           # SSH auf Port 2223 (nicht 2222!)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      DISPATCHER_API_URL: "http://api:8080"
      Dispatcher__ApiUrl: "http://api:8080" # API URL (innerhalb Docker)
      Dispatcher__DispatcherId: "dispatcher-1"

  dispatcher-2:
    container_name: opengitbase_dispatcher_2
    restart: unless-stopped
    build:
      context: ./applications/OpenGitBase.Dispatcher    # Build vom dispatcher-Pfad
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_started          # Dispatcher startet nach API
    ports:
      - "2224:22"                           # SSH auf Port 2224 (nicht 2223!)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      DISPATCHER_API_URL: "http://api:8080"
      Dispatcher__ApiUrl: "http://api:8080" # API URL (innerhalb Docker)
      Dispatcher__DispatcherId: "dispatcher-2"

  postgres:
    image: postgres:16
    container_name: opengitbase_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opengitbase
    volumes:
      - opengitbase_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: opengitbase_api
    restart: unless-stopped
    build:
      context: .
      dockerfile: applications/OpenGitBase.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Sql__ConnectionString: "Host=postgres;Port=5432;Database=opengitbase;Username=postgres;Password=postgres"
      Debug__Features__EmailVerification: "true"

  web:
    container_name: opengitbase_web
    restart: unless-stopped
    build:
      context: ./applications/opengitbase-web
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_INSTANCE_NAME: OpenGitBase
        NUXT_PUBLIC_API_BASE: /api
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  opengitbase_pgdata:
  opengitbase_storage1_ssh:
  opengitbase_storage1_repos:
  opengitbase_storage2_ssh:
  opengitbase_storage2_repos:
  
