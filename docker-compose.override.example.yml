# Copy to docker-compose.override.yml (gitignored) and fill in values.
#
# Fleet enrollment tokens and dispatcher SSH keys are written automatically by:
#   ./scripts/bootstrap-fleet.sh
#
# API settings use ASP.NET Core env vars (appsettings.json sections joined with __).
# Uncomment optional secrets only when overriding appsettings defaults.
#
# First-time start (before bootstrap-fleet.sh):
#   docker compose up -d --build postgres api-1 api-2 ssh-lb
#
# Run bootstrap:
#.  ./scripts/bootstrap-fleet.sh
#
# After bootstrap, use rolling updates for code changes:
#   ./scripts/rolling-update.sh
#
# Full stack (initial bootstrap only):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --build

x-api-env: &api-env
  environment:
    # Local dev clone URLs (production uses https://opengitbase.com from docker-compose.yml)
    Git__PublicBaseUrl: "http://localhost:8089"

    # SendGrid — set ApiKey and IsDisabled to "false" to send mail
    SendGrid__ApiKey: "SG.replace-me"
    SendGrid__FromEmailAddress: "noreply@example.com"
    SendGrid__FromSenderName: "OpenGitBase"
    SendGrid__IsDisabled: "true"

    # Optional secrets (uncomment; env vars override appsettings — do not leave blank):
    # Jwt__Key: "REPLACE_WITH_JWT_SIGNING_KEY"
    # Encryption__DataKey: "REPLACE_WITH_BASE64_32_BYTE_KEY"
    # Encryption__Pepper: "REPLACE_WITH_UNIQUE_PEPPER"
    # AdminSeed__Password: "REPLACE_WITH_ADMIN_PASSWORD"

    # OAuth client IDs (optional)
    # Google__ClientId: "REPLACE_WITH_GOOGLE_CLIENT_ID"
    # Apple__ClientId: "REPLACE_WITH_APPLE_CLIENT_ID"

    # First-start admin user seed
    AdminSeed__Enabled: "true"
    AdminSeed__Username: "admin"
    AdminSeed__Email: "admin@localhost"
    AdminSeed__OrganizationName: "OpenGitBase"
    AdminSeed__OrganizationSlug: "opengitbase"

    # Repository storage quotas
    RepositoryStorageQuota__Enabled: "true"
    RepositoryStorageQuota__MaxBytes: "1073741824"
    RepositoryStorageQuota__MaxFileBytes: "52428800"

    # Debug feature flags
    Debug__Features__EmailVerification: "true"

    # Restrict internal fleet endpoints to the Docker network
    InternalNetwork__Enabled: "true"

x-web-build: &web-build
  build:
    args:
      NUXT_PUBLIC_INSTANCE_NAME: "OpenGitBase"
      NUXT_PUBLIC_INSTANCE_LOGO_URL: ""
      NUXT_PUBLIC_API_BASE: "/api"
      NUXT_PUBLIC_SITE_GATE_ENABLED: "true"

services:
  api-1:
    <<: *api-env

  api-2:
    <<: *api-env

  storage-1:
    environment:
      STORAGE_ENROLLMENT_TOKEN: ""
      DISPATCHER_SSH_PUBLIC_KEY: ""

  storage-2:
    environment:
      STORAGE_ENROLLMENT_TOKEN: ""
      DISPATCHER_SSH_PUBLIC_KEY: ""

  dispatcher-1:
    environment:
      FLEET_BOOTSTRAP_TOKEN: ""

  dispatcher-2:
    environment:
      FLEET_BOOTSTRAP_TOKEN: ""

  web-1:
    <<: *web-build

  web-2:
    <<: *web-build

  opengitbase_cloudflare_tunnel:
    command: tunnel --no-autoupdate run --url http://ssh-lb:8080 --token REPLACE_WITH_CLOUDFLARE_TUNNEL_TOKEN
